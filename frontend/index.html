<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Student Management System</h1>

        <div class="dashboard-wrapper">
            
            <div class="left-column">
                <div class="form-container">
                    <h2 id="form-title">Add New Student</h2>
                    <form id="student-form">
                        <input type="hidden" id="student-id">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="course">Course</label>
                            <input type="text" id="course" required>
                        </div>
                        <div class="form-group">
                            <label for="birthdate">Birthdate</label>
                            <input type="date" id="birthdate" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="number" id="phone" required>
                        </div>
                        <div class="form-actions">
                            <button type="submit" id="submit-btn">Add Student</button>
                            <button type="button" id="cancel-btn" class="hidden">Cancel</button>
                        </div>
                    </form>
                </div>

                <div id="logs-container">
                    <h2>API Request Logs</h2>
                    <div class="logs-controls">
                        <button id="refresh-logs-btn" class="btn-refresh">Refresh Logs</button>
                        <span id="logs-count">Total logs: 0</span>
                    </div>
                    <div class="logs-table-container">
                        <table id="logs-table">
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Method</th>
                                    <th>Status</th>
                                    <th>MS</th>
                                </tr>
                            </thead>
                            <tbody id="logs-tbody"></tbody>
                        </table>
                        <p id="no-logs" class="hidden">No logs available.</p>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="table-container">
                    <h2>Student List</h2>
                    <div class="table-scroll">
                        <table id="students-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Course</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="students-tbody"></tbody>
                        </table>
                        <p id="no-students" class="hidden">No students found.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
